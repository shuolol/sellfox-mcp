          - text: 12.2、 开发者对于赛狐的通知应当通过赛狐对外正式公布的通信地址、传真号码、电子邮件地址等联系信息进行送达。
          - text: 12.3、 本协议约定的地址、联系人及电子通信终端亦为双方工作联系往来、法律文书及争议解决时人民法院和/或仲裁机构的法律文书送达地址，人民法院和/或仲裁机构的诉讼文书（含裁判文书）向任何合同任何一方当事人的上述地址和/或工商登记公示地址（居民身份证登记地址）送达的，视为有效送达。当事人对电子通信终端的联系送达适用于争议解决时的送达。
