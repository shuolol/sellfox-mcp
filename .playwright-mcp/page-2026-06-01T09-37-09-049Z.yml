      - heading "赛狐开放平台免责声明" [level=1] [ref=e258]
      - generic [ref=e260]:
        - strong [ref=e262]: 提示条款
        - generic [ref=e263]:
          - strong [ref=e264]: 在使用深圳美云集网络科技有限责任公司项下赛狐开放平台服务之前，您应当认真阅读并遵守本协议的全部内容。请您务必审慎阅读、充分理解各条款的内容，
          - text: 特别是以粗体标注的条款，
          - strong [ref=e265]: 包括但不限于免除或者限制赛狐责任的条款、对开发者权利进行限制的条款、争议解决和法律适用条款等。
          - text: 如果您对本协议的条款有疑问的，请通过赛狐客服渠道进行询问，赛狐将向您解释条款内容。如果您不同意本协议的任意内容，或者无法准确理解赛狐对条款的解释，请不要进行任何后续操作。否则，表示您已充分阅读、理解并接受了本协议的全部内容，同意受本协议约束，成为赛狐开放平台用户。届时您不应以未阅读本协议的内容或者未获得赛狐对您问询的解答等理由，主张本协议无效，或要求撤销本协议。
        - heading "第一条、 定义" [level=3] [ref=e266]:
          - text: 第一条、 定义
          - link [ref=e267] [cursor=pointer]:
            - /url: "#第一条-定义"
        - generic [ref=e268]:
          - text: 1.1、 赛狐开放平台（以下简称“开放平台”）：指基于赛狐平台各类电子商务业务、软件服务的开放，由赛狐提供一些软件和支持数据，开发者通过这些软件和支持数据开发应用以便服务于自身或服务于赛狐平台其他用户。开发者可以通过开放平台应用编程接口调用指定的功能服务，访问由赛狐提供的或用户授权的与用户相关的数据和/或来自其他赛狐应用程序的数据信息，或者由开发者应用向赛狐提供、回流数据。开放平台可能包括但不限于一个或多个API、编程工具和文档。
          - text: 1.2、 开发者：指赛狐会员中通过有效申请并通过验证的可以基于开放平台进行应用开发的单位或者个人，在开放平台开发者也可称为“开发者”。
          - text: 1.3、 应用：指开发者基于开放平台所开发的软件或服务，包括自用型应用和他用型应用两种类型。
          - text: 1.4、 App key & App secret：指开发者在申请开发新应用时获得的由赛狐授予的应用程序接入账户和密钥。App key是应用的唯一标识，赛狐通过App key来识别应用开发者的身份。App secret是赛狐给应用分配的密钥，该密钥在一定技术条件下可保证应用来源的可靠性。
          - text: 1.5、 基础API：指对所有业务开放、开发者无需申请即可自由使用的开放平台数据接口。基础API按照赛狐是否收费可区分为免费API和收费API。
          - text: 1.6、 增值API： 指面向特定业务开放、须向赛狐申请获准后才能使用的开放平台数据接口。增值API按照赛狐是否收费可区分为免费API和收费API。
          - text: 前述基础API和增值API的分类是依据API的功能、安全性和数据价值来确定的，并可能随着业务发展而不时调整，请开发者密切关注赛狐开放平台的业务公告及相关API文档。
        - heading "第二条、 立约背景" [level=3] [ref=e269]:
          - text: 第二条、 立约背景
          - link [ref=e270] [cursor=pointer]:
            - /url: "#第二条-立约背景"
        - strong [ref=e272]: 2.1、 为了规范赛狐开放平台合作伙伴(以下简称“开发者”或“您”)通过开放平台进行的各项行为，包括但不限于通过开放平台调用应用数据接口（即API）、使用开放平台数据同步服务，明确开发者的权利义务，营造规范、有序、安全的开放平台环境，保障开发者及用户的合法权益，拟定本协议。
        - heading "第三条、 签约主体" [level=3] [ref=e273]:
          - text: 第三条、 签约主体
          - link [ref=e274] [cursor=pointer]:
            - /url: "#第三条-签约主体"
        - generic [ref=e275]: 3.1、 本协议由深圳美云集网络科技有限责任公司（以下简称“赛狐”）与开发者签署，本协议对赛狐与开发者均具有合同效力。
        - heading "第四条、 协议生效和适用范围" [level=3] [ref=e276]:
          - text: 第四条、 协议生效和适用范围
          - link [ref=e277] [cursor=pointer]:
            - /url: "#第四条-�协议生效和适用范围"
        - generic [ref=e278]:
          - text: 4.1、 您通过网络页面点击确认或以其他方式选择接受本协议，包括但不限于未点击确认本协议但使用了赛狐开放平台的服务，即表示您与赛狐已达成一致并同意接受本协议的全部约定内容。
          - strong [ref=e279]:
            - text: 本协议自您确认接受之时起或自您使用赛狐开放平台服务的行为发生之时起（以时间在先者为准）生效。
            - text: 4.2、 由于本协议内容并不能完整罗列并覆盖您与赛狐所有的权利与义务，现有的约定也无法保证完全符合未来发展的需求，因此，包括所有赛狐已经发布的或将来可能发布的各类规则（含业务规范，以下同）、通知、公告等（以下合称“规则”），均成为本协议的补充协议，与本协议不可分割且具有同等法律效力。赛狐有权根据需要不时地制定、修改本协议和/或各类规则，如有任何变更，赛狐将以网站公示的方式进行公告，而不再单独通知您。变更后的协议和规则一经公布即自动生效，成为本协议的一部分。如您不同意相关变更，应当立即停止使用赛狐开放平台服务；如您继续使用赛狐开放平台服务的，则视为您对修改后的协议和规则无异议并同意遵守。
        - heading "第五条、 开发者入驻" [level=3] [ref=e280]:
          - text: 第五条、 开发者入驻
          - link [ref=e281] [cursor=pointer]:
            - /url: "#第五条-开发者入驻"
        - generic [ref=e282]:
          - text: 5.1、 您应用通过登录赛狐平台，使用电子邮箱或手机号注册成为开发者，注册成功后，相应的手机号和邮箱不得更改，使用的电子邮箱和手机号应该合法，并遵守相关规定。
          - text: 5.2 您应当符合开放平台的准入条件，按照入驻流程入驻开放平台成为开发者。
          - text: 5.3、 您理解并认可，
          - strong [ref=e283]: 赛狐仅能以普通或非专业人员的知识水平标准
          - text: 对您在入驻环节填写或提交的入驻资料（如有）、入驻信息进行表面识别，且赛狐保留抽查、要求您补充提交、及时更新入驻材料及入驻信息的权利。
          - strong [ref=e284]: 您应当对入驻材料、入驻信息的真实性、合法性、有效性独立承担全部责任；如赛狐发现您的入驻资料、信息造假或失效的，赛狐有权立即终止本协议并根据相关规则追究您的法律责任。
          - text: 5.4、
          - strong [ref=e285]: 您在赛狐平台中注册成功的账号不得转让，赛狐允许您在账号下创建子账号，赛狐视子账号与您账号具有同样的权力和义务。
        - heading "第六条、 赛狐服务内容" [level=3] [ref=e286]:
          - text: 第六条、 赛狐服务内容
          - link [ref=e287] [cursor=pointer]:
            - /url: "#第六条-赛狐服务内容"
        - generic [ref=e288]:
          - text: 6.1、 赛狐为开发者提供应用开发的相关网络环境和技术支持，包括应用数据接口的开发、封装，数据同步，应用开发、运行的系统环境，以及与此有关的互联网技术服务。
          - strong [ref=e289]: 开发者同意依照本协议的约定向赛狐支付使用开放平台相关技术服务的使用费用。赛狐提供的网络空间服务暂时不收取费用，但赛狐保留今后进行收费的权利。
          - text: 6.2、 如存在下列情况，赛狐
          - strong [ref=e290]: 以普通或非专业人员的知识水平标准
          - text: 对相关内容进行判别，可以认为这些内容或行为具有违法或不当性质的，
          - strong [ref=e291]: 赛狐有权删除相关信息或停止对该开发者提供服务，并追究其法律责任
          - text: ：
          - text: 6.2.1、 第三方通知赛狐，认为某个开发者或具体应用事项可能存在重大问题；
          - text: 6.2.2、 用户或第三方向赛狐告知开放平台上有违法或不当行为，例如开发者非法获取或使用用户数据等。
          - text: 6.3、 赛狐有权对开发者和用户的注册数据及交易行为进行查阅，
          - strong [ref=e292]: 发现注册数据或交易行为中存在任何问题或怀疑，均有权向开发者发出询问或要求改正的通知，或者直接作出删除等处理。
          - text: 6.4、 对于开发者在赛狐开放平台上发布的下列信息，
          - strong [ref=e293]: 赛狐有权在不通知开发者的前提下进行删除或采取其它限制性措施，包括但不限于涉嫌违法、侵犯第三人合法权益、违反公序良俗、社会公德，或赛狐认为不妥当的其他信息。
          - text: 6.5、 赛狐根据其判断认为开发者账户存在异常活动的，赛狐可以单方暂停该等账户的使用。开发者违反本协议约定的，赛狐可以单方暂停或终止开发者使用服务和相关账户。
        - heading "第七条、 开放平台服务使用规范" [level=3] [ref=e294]:
          - text: 第七条、 开放平台服务使用规范
          - link [ref=e295] [cursor=pointer]:
            - /url: "#第七条-开放平台服务使用规范"
        - generic [ref=e296]:
          - text: 7.1、 开发者承诺同时遵守《赛狐平台注册服务协议》。
          - text: 7.2、 开发者成功入驻开放平台后，赛狐将根据您的登录账户和密码确认您的身份；开通开放平台服务的账户仅限于开发者自身使用，开发者不得将该账户以任何形式向任何第三方转让、出租、出借、泄露、披露等。
          - strong [ref=e297]: 您应妥善保管账户和密码，并对使用该账户和密码所进行的一切行为承担全部责任。
          - text: 您承诺在密码或账户遭到未获授权的使用，或者发生其他安全问题时，将立即通知赛狐，且您同意并确认，除非因赛狐过错导致账户被盗，
          - strong [ref=e298]: 赛狐不对上述情形产生的任何直接或间接的遗失或损害承担责任。
          - text: 7.3、 开发者声明并保证其使用开放平台服务过程中遵守如下要求：
          - text: 7.3.1、 不复制、模仿、修改、篡改、翻译、改编、出借、出售、转许可、在信息网络上传播或转让开放平台服务和/或相关软件，也不得逆向工程、反汇编、反编译、分解拆卸或试图以其他方式发现开放平台服务/软件的源代码，或者在未经明确允许的情况下创作衍生作品；
          - text: 7.3.2、 不分发、销售、转销、租赁、许可、再许可或通过其他方式将开放平台或任何用户信息提供给第三方（包括以任何方式存储开放平台或用户信息致使第三方能够访问）；
          - text: 7.3.3、 不从事避开或修改赛狐数据统计工具的行为；
          - text: 7.3.4、 不发送和储存带有病毒的、蠕虫的、木马和其他有害的计算机代码、文件、脚本和程序；
          - text: 7.3.5、 不利用赛狐提供的资源和服务上传、下载、储存、发布任何违法违规、侵权、淫秽、色情、不道德、欺诈、诽谤（包括商业诽谤）、非法恐吓或非法骚扰等信息或内容，不为他人发布该等信息提供任何便利（包括但不限于设置URL、BANNER链接等）；
          - text: 7.3.6、 不侵犯赛狐和/或其关联公司或任何第三方的合法权益；
          - text: 7.3.7、 如开放平台服务涉及第三方软件之许可使用的，您同意遵守相关的许可协议的约束；
          - text: 7.3.8、 不从事其他违法、违规或不恰当的行为。
          - text: 7.4、 开发者声明并保证其在开放平台开发、发布的应用符合如下要求：
          - text: 7.4.1、 真实、合法、准确、完整，不会有任何淫秽、色情、不道德、欺诈、诽谤（包括商业诽谤）、非法恐吓或非法骚扰的内容；
          - text: 7.4.2、 不会侵犯任何第三方享有的合法权利或权益，包括但不限于第三方知识产权等；
          - text: 7.4.3、 不会违反任何法律、法规、条例或规章 (包括但不限于关于规范互联网站、互联网信息、不正当竞争的法律、法规、条例或规章)；
          - text: 7.4.4、 不会含有任何类型的恶意计算机程序、病毒；不得以任何方式干扰或企图干扰开放平台、其他开发者应用或其任何部分或功能的正常运行；
          - text: 7.4.5、 不会直接或间接与下述各项内容链接：（1）任何法律、法规、条例或规章所禁止的商品或服务；或 （2）无权链接或包含的商品或服务。
          - text: 7.5、 开发者开发、发布的应用需要收集或使用用户数据的，应当符合以下条件：
          - text: 7.5.1、 开发者必须事先获得用户的同意，且应当告知用户相关数据收集的目的、范围及使用方式，保障用户知情权；
          - text: 7.5.2、 开发者不得请求、收集、索取或以其他方式从任何用户处获取对赛狐账户、密码或其他身份验证凭据的访问权；不得为任何用户自动登录到赛狐网站提供代理身份验证凭据；不得提供“跟踪”功能，包括但不限于识别其他用户在开发者应用档案文件页上查看或操作；
          - text: 7.5.3、 开发者不得利用其他开发者的App key或相关权限获取赛狐平台用户数据；
          - text: 7.5.4、 开发者应当仅获取为应用程序运行及功能实现目的而必要的数据，开发者在特定应用中收集的用户数据仅可以在该特定应用中使用，不得将收集的用户数据转移或使用在该特定应用之外, 不得将用户数据出售、转让或用于特定应用之外的任何其他目的；
          - text: 7.5.5、 开发者应当向用户提供修改、删除用户数据的方式，确保用户要求删除其用户数据时可通过该方式自行操作完成，并确保相关数据被完全删除；
          - text: 7.5.6、 赛狐有权限制或阻止开发者获取用户数据及开放平台运营数据，有权自主决定相关数据的保存期限；如赛狐认为开发者使用用户数据的方式、数据收集的目的或收集的范围有可能损害用户体验、侵犯用户权益或者不符合应用程序运行或功能实现的目的，赛狐有权要求开发者立即删除相关数据并不得再以该方式使用或再行收集该等数据；
          - text: 7.5.7、 一旦用户退订或停止使用开发者的应用，开发者必须立即删除从该用户处获取的全部数据；且赛狐有权基于数据安全的考虑不经通知径行做出删除数据的处理措施。
          - text: 7.6、
          - strong [ref=e299]: 开发者承诺自觉就其发布的应用系统接入相关日志（包括但不限于用户端的应用日志、服务器端登录日志、服务器端订单访问日志、服务器端向第三方应用传递订单日志、服务器端调用赛狐日志），并同意赛狐为系统安全监控目的使用该等日志。
          - text: 7.7、
          - strong [ref=e300]: 开发者同意开放平台运营数据（包括但不限于用户注册信息、用户针对开发者应用的使用数据）的全部权利均归属赛狐。开发者承诺在未经赛狐事先书面批准的情况下，不得为任何目的擅自保存、使用或授权他人使用前述运营数据；如经赛狐书面同意开发者可以使用平台运营数据的，其行为应当同时符合本协议第7.5条的约定。
          - text: 7.8、
          - strong [ref=e301]: 开发者违反法律法规或本协议的约定非法获取或不当使用相关数据的，赛狐有权采取直接终止本协议、删除开发者已获取的相关数据、下架应用等措施，且前述措施可以合并使用；开发者应当以自己的名义独立承担全部责任，并对赛狐、用户或任何第三方造成的损失进行赔偿。
          - text: 7.9、 开发者同意接收来自赛狐及其关联公司发出的邮件、信息。
          - text: 7.10、 开发者一旦在开放平台申请成功，成为开发者，并在申请发布一个新应用时，开发者将得到一个针对该应用的唯一的App key 和App secret 。开发者同意通过开放平台提供的途径合法获取应用标识（App key）及密钥（App secret）。开发者对App key 和App secret的机密负完全责任。
          - strong [ref=e302]: 开发者同意任何时候都不使用其他开发者的App key 和App secret，也不将自身的App key 和App secret透露给任何第三方。
          - text: 开发者同意在发现或怀疑他人未经AA授权就使用其App key 和App secret时立即通知赛狐。赛狐对开发者的App key和App secret的所有使用情况，包括但不限于任何未经授权的访问、更改或者删除、破坏、损害、丢失或未能存储均不承担任何责任。
          - text: 7.11、
          - strong [ref=e303]: 开发者不得暗示赛狐加入、赞助或认可开发者的应用
          - text: ，包括但不限于在开发者应用名称中或顶级域名左侧的URL中使用赛狐、sellfox、赛狐erp或赛狐关联公司的名称的任何变体、缩写或错误拼写。
        - heading "第八条、 知识产权" [level=3] [ref=e304]:
          - text: 第八条、 知识产权
          - link [ref=e305] [cursor=pointer]:
            - /url: "#第八条-知识产权"
        - generic [ref=e306]:
          - text: 8.1、 赛狐开放平台上所有内容，包括但不限于著作、图片、档案、资讯、资料、网站架构、网站画面的安排、网页设计，均由赛狐或其他权利人依法拥有其知识产权，包括但不限于商标权、专利权、著作权、商业秘密等。非经赛狐或其他权利人书面同意任何人不得擅自使用、修改、复制、公开传播、改变、散布、发行或公开发表赛狐网站程序或内容。
          - text: 8.2、
          - strong [ref=e307]: 赛狐开放平台运营数据的全部权利，均归属赛狐。前述运营数据包括但不限于任何用户注册信息、用户针对开发者应用的使用数据等。未经赛狐事先书面同意，开发者不得为任何目的擅自保存、使用或授权他人使用前述运营数据。
          - text: 8.3、 根据本协议的条款和条件，赛狐授予开发者有限的、非排他性的、可随时终止的和不可再分发的许可，仅限于开发者在自己访问和使用开放平台开发、测试、显示其应用时，允许开发者访问赛狐提供的或用户自身授权的用户信息，并允许其他赛狐平台用户访问开发者应用；
          - strong [ref=e308]: 但赛狐有权随时在提前通知或不通知的情况下自行限制、约束或禁止开发者或其他赛狐平台用户访问开发者的应用。
          - text: 8.4、 开发者保留其创建的应用内容以及其中包括的所有权利、权属或权益，包括但不限于归属于开发者的知识产权（但赛狐知识产权除外）。
          - strong [ref=e309]: 开发者通过开放平台提交或发布应用，即表明开发者授予赛狐服务期内的、非排他性的、完全给付并免费的全球性许可，允许赛狐使用、复制、再许可、重设格式、 修改、删除、添加、公开显示、重现、分发和执行开发者应用，以及将其存储和缓存在赛狐指定服务器上。
        - heading "第九条、 违约责任" [level=3] [ref=e310]:
          - text: 第九条、 违约责任
          - link [ref=e311] [cursor=pointer]:
            - /url: "#第九条-违约责任"
        - generic [ref=e312]:
          - text: 9.1、 **您明确理解并同意赛狐有权以普通或非专业人员的知识水平标准对您的行为进行单方认定，并根据单方认定结果适用规则予以处理或中止、终止向您提供服务（包括中止或终止开放平台API的调用，以下同），且无须征得您的同意或提前通知予您。赛狐根据相关规则对您进行处理后，不免除您应当承担的法律责任。
          - text: 9.2、 如因您违反有关法律法规或者本协议、相关规则之规定，使赛狐遭受任何损失、受到用户、任何第三方的索赔或任何行政管理部门的处罚，您应对赛狐、用户或相关第三方的实际损失进行全额赔偿，包括诉讼费及合理的律师费用。
        - heading "第十条、 免责和有限责任" [level=3] [ref=e313]:
          - text: 第十条、 免责和有限责任
          - link [ref=e314] [cursor=pointer]:
            - /url: "#第十条-免责和有限责任"
        - generic [ref=e315]:
          - text: 10.1、用户在使用赛狐开放平台时，应自行承担因误操作或其他不当行为产生的风险和损失。赛狐不承担因用户误操作或其他不当行为导致的任何损失或责任。
          - text: 10.2、用户应确保其使用赛狐开放平台的行为不会对赛狐系统造成任何损害或影响。如因用户原因导致赛狐系统受到损害，用户应承担相应的法律责任。
          - text: 10.3、用户在使用赛狐开放平台时，应遵守相关法律法规和赛狐平台的规定。如发现用户违反法律法规或赛狐平台的规定，赛狐有权立即停止提供服务，并保留追究法律责任的权利。
          - text: 10.4、用户应确保其使用赛狐开放平台的数据安全。如发现用户非法获取或使用赛狐开放平台的数据，赛狐有权立即停止提供服务，并保留追究法律责任的权利。
          - text: 10.5、用户在使用赛狐开放平台时，应自行承担因自身原因导致的任何损失或责任。如因用户原因导致信息数据泄露、损失或损害，用户应承担全部法律责任，并对因此产生的损失进行赔偿。
          - text: 10.6、 对于开发、运营、支持和维护开发者应用，开发者同意独立承担所有的风险和后果。赛狐没有责任和义务对于发布在赛狐开放平台上的任何不准确或不正确的内容承担任何责任，无论该等不准确是由用户所造成的，还是由于应用所使用的或与应用相连接的任何设备或程序所造成的。
          - text: 10.7、 赛狐开放平台、赛狐服务市场仅作为开发者和用户物色交易对象，就应用的交易进行协商，以获取或使用各类应用的地点。本协议的签署并不意味着赛狐成为用户在赛狐开放平台上与开发者所进行交易的参与者，对前述交易赛狐仅提供技术服务，不对开发者和用户行为的合法性、有效性及应用的真实性、合法性和有效性作任何明示和默示的担保。
          - text: 10.8、 开发者明确理解和同意，赛狐服务将按“现状”和按“可得到”的状态提供。赛狐将在现有技术的基础上尽最大努力提供相应的安全措施以保障服务安全和正常运行。但由于可能存在的计算机病毒、网络通讯故障、系统维护等方面的因素以及可能发生的不可抗力事件，赛狐在此明确声明对服务不作任何明示或暗示的保证，包括但不限于对服务的可适用性、没有错误或疏漏、持续性、准确性、可靠性、适用于某一特定用途。赛狐不对因下述任一情况而导致的任何损害赔偿承担责任，包括但不限于利润、商誉、使用、数据等方面的损失或其它无形损失的损害赔偿（无论赛狐是否已被告知该等损害赔偿的可能性）：
          - text: 10.8.1、 使用或未能使用“服务”；
          - text: 10.8.2、 第三方未经批准的接入或第三方更改用户的传输数据或数据；
          - text: 10.8.3、 第三方对“服务”的声明或关于“服务”的行为；或非因赛狐的原因而引起的与“服务”有关的任何其它事宜，包括疏忽；
          - text: 10.8.4、 可能存在的计算机病毒、网络通讯故障、系统停机维护等；
          - text: 10.8.5、 因自然灾害、罢工、暴乱、战争、政府行为、司法行政命令等不可抗力因素；
          - text: 10.8.6、 因电力供应故障、通讯网络故障等公共服务因素或第三人因素；
          - text: 10.9、 在任何情况下，赛狐均不对任何间接性、后果性、惩戒性、偶然性、特殊性或刑罚性的损害，包括开发者使用开放平台而遭受的利润损失，承担责任（即使赛狐已被告知该等损失的可能性）。
          - text: 10.10、 尽管本协议中可能含有相反的规定，赛狐对开发者承担的最大的总体责任和赔偿不超过赛狐在截止违约之时基于该开发者单个App key提供的开放平台服务而获得的本协议下相应服务期内API技术服务费用收入的总额，该等技术服务费用收入也仅限于以货币方式收取的实际收入而不包括其他利益，前述“相应服务期内”特指开发者单个App key享受开放平台服务之日起算，至赛狐违约行为发生之日为止。
        - heading "第十一条、 协议终止与转让" [level=3] [ref=e316]:
          - text: 第十一条、 协议终止与转让
          - link [ref=e317] [cursor=pointer]:
            - /url: "#第十一条-协议终止与转让"
        - generic [ref=e318]:
          - text: 11.1、 本协议在符合以下任意一项情形时终止：
          - text: 11.1.1、 通知解除：赛狐可提前15天终止本协议而无须承担任何之违约责任；
          - text: 11.1.2、 单方解除权：出现下列情况之一的，赛狐有权立刻终止本协议，且按有关规则对您进行处罚：
          - text: （1） 您违反本协议中的任何承诺或保证，包括但不限于本协议项下的任何约定；
          - text: （2） 您违反赛狐平台的相关条款、协议、规则、通告等相关规定，而被赛狐平台终止提供服务的；
          - text: （3） 您被赛狐清退出赛狐卖家服务市场的。
          - text: （4） 其他赛狐认为应当终止本协议的情形。
          - text: 11.1.3、 开发者主动提出终止赛狐服务市场服务的，应提前一个月通知赛狐，并由赛狐按相关规定审核开发者符合退出条件：即开发者与赛狐、赛狐商家不存在任何纠纷；
          - text: 11.1.4、 如开发者在本协议终止后再一次直接或间接或以他人名义注册并登录赛狐开放平台的，赛狐有权直接单方面终止向该开发者提供服务。
          - text: 11.1.5本协议规定的其他协议终止条件发生或实现，导致本协议终止。
          - text: 11.2、 协议终止后的处理：
          - text: 11.2.1、 服务终止后，赛狐没有义务为开发者保留原账户中或与之相关的任何信息，或转发、披露任何未曾阅读或发送的信息给开发者或用户或第三方，亦不就终止服务而对开发者或用户或任何第三方承担任何责任。**
          - text: 11.2.2、 不论赛狐与开发者之间的服务因任何原因以任何方式终止，赛狐仍有权：
          - text: （1） 保存或不保存该开发者的数据及以前的交易行为记录；
          - text: （2） 对于开发者在服务终止前实施的违法或违约行为所导致的任何赔偿和责任， 开发者必须完全独立地承担，赛狐有追索权；
          - text: （3） 要求开发者立即删除其从开放平台中获得的全部数据，，包括但不限于用户数据、开放平台运营数据；且赛狐有权基于数据安全的考虑不经通知径行做出删除相关数据的处理措施。
          - text: 11.3、 无论本协议因何原因终止，在协议终止前的行为所导致的任何责任，您必须完全且独立地承担；协议终止后，赛狐无需继续向您提供服务。
          - text: 11.4、
          - strong [ref=e319]: 赛狐有权将本协议项下的全部权利和义务转让予赛狐的关联公司，而无须事先征得您的同意，届时赛狐将通过网站公告等方式向您发出转让通知。
